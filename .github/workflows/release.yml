name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Publish to npm for any tagged release
  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # Publish @quilix/core
      - name: Publish @quilix/core
        if: success()
        run: |
          cd packages/@quilix/core
          npm publish --access public --provenance --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish @quilix/create-app
      - name: Publish @quilix/create-app
        if: success()
        run: |
          cd packages/@quilix/create-app
          npm publish --access public --provenance --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish @quilix/cli
      - name: Publish @quilix/cli
        if: success()
        run: |
          cd packages/@quilix/cli
          npm publish --access public --provenance --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Build Rust CLI for multiple platforms
  build-rust:
    name: Build Rust CLI
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: quilix-linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: quilix-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: quilix-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            artifact: quilix-win-x64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release --package quilix-cli --target ${{ matrix.target }}
        shell: bash

      - name: Copy binary (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: cp target/x86_64-pc-windows-gnu/release/quilix.exe quilix-win-x64.exe

      - name: Copy binary (Unix)
        if: matrix.target != 'x86_64-pc-windows-gnu'
        run: cp target/${{ matrix.target }}/release/quilix ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # Create GitHub Release
  create-release:
    name: Create GitHub Release
    needs: [publish-npm, build-rust]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${tag#v}" >> $GITHUB_OUTPUT
        env:
          tag: ${{ github.ref_name }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: quilix-*
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Quilix v${{ env.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            CHANGELOG.md
            README.md
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
